# Full pipeline — all middleware enabled
# This is the "real world" config for measuring total proxy overhead.

version: "1"

proxy:
  port: 4000
  host: "127.0.0.1"
  log_level: warn  # reduce log noise during benchmarks

providers:
  primary: anthropic
  definitions:
    anthropic:
      api_key: "bench-key-not-real"
      base_url: "http://127.0.0.1:9999"
      timeout_ms: 10000

auth:
  enabled: true
  tokens:
    - "bench-token-1"
    - "bench-token-2"
    - "bench-token-3"

cache:
  enabled: true
  max_entries: 10000

rate_limits:
  enabled: true
  default:
    requests_per_minute: 10000  # high limit — don't trip during benchmarks
    tokens_per_minute: 10000000

policies:
  - name: block-injections
    on: request
    condition:
      type: injection_score
      threshold: 0.9
    action: block
  - name: warn-medium-injection
    on: request
    condition:
      type: injection_score
      threshold: 0.5
    action: warn

audit:
  enabled: true
  output: stdout
  include_request_body: false
  include_response_body: false
