# Full pipeline minus audit — isolates audit overhead.
# Compare full-pipeline.yaml vs no-audit.yaml to measure audit cost.

version: "1"

proxy:
  port: 4000
  host: "127.0.0.1"
  log_level: warn

providers:
  primary: anthropic
  definitions:
    anthropic:
      api_key: "bench-key-not-real"
      base_url: "http://127.0.0.1:9999"
      timeout_ms: 10000

auth:
  enabled: true
  tokens:
    - "bench-token-1"

cache:
  enabled: true
  max_entries: 10000

rate_limits:
  enabled: true
  default:
    requests_per_minute: 10000
    tokens_per_minute: 10000000

policies:
  - name: block-injections
    on: request
    condition:
      type: injection_score
      threshold: 0.9
    action: block

audit:
  enabled: false
