# Auth only — minimal pipeline for baseline measurement.
# Compare against full-pipeline.yaml to measure middleware overhead.

version: "1"

proxy:
  port: 4000
  host: "127.0.0.1"
  log_level: warn

providers:
  primary: anthropic
  definitions:
    anthropic:
      api_key: "bench-key-not-real"
      base_url: "http://127.0.0.1:9999"
      timeout_ms: 10000

auth:
  enabled: true
  tokens:
    - "bench-token-1"

cache:
  enabled: false

rate_limits:
  enabled: false

policies: []

audit:
  enabled: false
