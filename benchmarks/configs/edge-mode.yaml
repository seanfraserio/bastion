# Edge mode benchmark — mock provider acts as "cloud proxy"
version: "1"

proxy:
  port: 4000
  host: "127.0.0.1"
  log_level: warn

upstream:
  url: "http://127.0.0.1:9999"
  proxy_key: "bench-proxy-key"
  forward_agent_headers: true

auth:
  enabled: true
  tokens:
    - "bench-token-1"

cache:
  enabled: true
  max_entries: 10000

rate_limits:
  enabled: true
  requests_per_minute: 10000

policies:
  - name: block-injections
    on: request
    condition:
      type: injection_score
      threshold: 0.9
    action: block

audit:
  enabled: true
  output: stdout
