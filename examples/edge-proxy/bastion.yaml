# Edge Proxy Mode — local proxy forwarding to a cloud Bastion instance.
#
# Usage:
#   BASTION_PROXY_KEY=bst_your_key bastion start -c examples/edge-proxy/bastion.yaml

version: "1"

proxy:
  port: 3000
  host: "127.0.0.1"
  log_level: info

upstream:
  url: "https://api.bastion.cloud"
  proxy_key: "${BASTION_PROXY_KEY}"
  forward_agent_headers: true

auth:
  enabled: true
  tokens:
    - "${LOCAL_AGENT_TOKEN}"

cache:
  enabled: true
  max_entries: 5000

rate_limits:
  enabled: true
  requests_per_minute: 100

audit:
  enabled: true
  output: file
  file_path: ./logs/edge-audit.jsonl
