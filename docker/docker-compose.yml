services:
  bastion:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      # Bound to localhost for security. Change to "4000:4000" to expose to network.
      - "127.0.0.1:4000:4000"
    volumes:
      - ./bastion.yaml:/app/bastion.yaml:ro
      - ./logs:/app/logs
    environment:
      - ANTHROPIC_API_KEY
      - OPENAI_API_KEY
    restart: unless-stopped
